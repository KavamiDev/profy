<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="24" fill="#1c1a17"/>

  <!-- P letter form: geometric, modern -->
  <g fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical spine -->
    <line x1="32" y1="24" x2="32" y2="104"/>

    <!-- Top horizontal -->
    <line x1="32" y1="24" x2="64" y2="24"/>

    <!-- Right curve (half circle for bowl) -->
    <path d="M 64 24 Q 80 24 80 44 Q 80 64 64 64"/>

    <!-- Bottom horizontal right -->
    <line x1="32" y1="64" x2="64" y2="64"/>
  </g>

  <!-- Accent line (profile/resume theme) -->
  <line x1="32" y1="104" x2="80" y2="104" stroke="#ff7a5c" stroke-width="4" stroke-linecap="round"/>
</svg>
